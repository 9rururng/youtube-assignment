<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

h2 { margin-bottom:5px; }
.notice { font-size:13px; color:#888; margin-bottom:20px; }

/* 카드 */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#121212;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
}

/* 🔥 닉네임 (상단 영역) */
.name-bar {
  background:#fff;
  color:#000;
  text-align:center;
  padding:8px;
  font-size:14px;
  font-weight:500;
}

/* 썸네일 영역 */
.thumb-wrap {
  position:relative;
}

.card img {
  width:100%;
  aspect-ratio:16/9;
}

/* 카테고리 */
.category {
  position:absolute;
  top:8px;
  left:8px;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
}

.category.assignment { background:#2563eb; color:#fff; }
.category.free { background:#fff; color:#000; }

/* NEW */
.badge {
  position:absolute;
  top:8px;
  right:8px;
  background:#ff3b3b;
  color:#fff;
  padding:3px 8px;
  border-radius:12px;
  font-size:10px;
  font-weight:600;
}

/* 정보 */
.info { padding:12px; }
.title { font-size:14px; margin-bottom:4px; }
.sub { font-size:12px; color:#aaa; }

@media (max-width:600px) {
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<h2>🎸 영상 모음</h2>
<div class="notice">시트 입력 후 반영까지 1분 이내의 시간이 걸릴 수 있어요😋</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let cache = {};

/* 🔥 유튜브 API */
async function getYoutubeTitle(videoId){
  const API_KEY = "AIzaSyDeLlRW5ipOfesPCPu9ruc0FCC198fqNY0";

  if(cache[videoId]) return cache[videoId];

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${API_KEY}`
  );
  const data = await res.json();

  if(!data.items || data.items.length === 0) return "제목 없음";

  const title = data.items[0].snippet.title;
  cache[videoId] = title;
  return title;
}

function getVideoId(url){
  if(url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
  if(url.includes("shorts")) return url.split("/shorts/")[1].split("?")[0];
  if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
}

function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    parseCSV(a,"assignment");
    parseCSV(f,"free");
    render();
  });
}

function parseCSV(data,type){
  const rows = data.split("\n").slice(1);

  rows.forEach(row=>{
    const cols = row.split(",");
    if(cols.length<3) return;

    const date = cols[0];
    const name = cols[1];
    const url = cols[2];

    const videoId = getVideoId(url);
    if(!videoId) return;

    allData.push({date,name,url,videoId,type});
  });
}

async function render(){
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  const now = new Date();

  for(const item of allData.slice().reverse()){

    const diff = (now - new Date(item.date))/(1000*60*60*24);
    const isNew = diff>=0 && diff<3;

    const thumb = `https://img.youtube.com/vi/${item.videoId}/0.jpg`;
    const title = await getYoutubeTitle(item.videoId);

    container.innerHTML += `
      <div class="card" onclick="window.open('${item.url}')">

        <div class="name-bar">${item.name}</div>

        <div class="thumb-wrap">
          <div class="category ${item.type}">
            ${item.type === "assignment" ? "과제" : "연습"}
          </div>

          ${isNew ? '<div class="badge">NEW</div>' : ''}

          <img src="${thumb}">
        </div>

        <div class="info">
          <div class="title">${title}</div>
          <div class="sub">${item.date}</div>
        </div>

      </div>
    `;
  }
}

loadAll();
</script>

</body>
</html>
