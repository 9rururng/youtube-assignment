<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>J-ROCK 과제 제출 영상</title>
  <style>
    body { background:#111; color:#fff; font-family:sans-serif; padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:20px; }
    .card { background:#1c1c1c; border-radius:10px; overflow:hidden; }
    img { width:100%; }
    .info { padding:10px; }
  </style>
</head>
<body>

<h2>🎸 J-ROCK 소모임 과제 제출 영상</h2>
<div class="grid" id="videoList"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);

    rows.reverse().forEach(row => {
      // 쉼표 2개까지만 나누기 (3열 구조)
      const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);

      if (!cols || cols.length < 3) return;

      const date = cols[0];
      const name = cols[1];
      const url = cols[2];

      if (!url) return;

      let videoId;

      if (url.includes("youtu.be")) {
        videoId = url.split("/").pop().split("?")[0];
      } else {
        videoId = url.split("v=")[1]?.split("&")[0];
      }

      if (!videoId) return; // 🔥 이거 중요

      const thumb = `https://img.youtube.com/vi/${videoId}/0.jpg`;

      const card = `
        <div class="card">
          <a href="${url}" target="_blank">
            <img src="${thumb}">
          </a>
          <div class="info">
            <div>${name}</div>
            <div style="font-size:12px;color:#aaa;">${date}</div>
          </div>
        </div>
      `;

      document.getElementById("videoList").innerHTML += card;
    });
  });
</script>
</body>
</html>
