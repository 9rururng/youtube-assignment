<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

/* 헤더 */
h2 {
  font-weight:700;
  margin-bottom:5px;
}

.notice {
  font-size:13px;
  color:#888;
  margin-bottom:20px;
}

/* 필터 */
.filters {
  display:flex;
  gap:15px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter-group {
  background:#151515;
  padding:12px;
  border-radius:14px;
}

.label {
  font-size:12px;
  color:#aaa;
  margin-bottom:6px;
}

.date-range {
  display:flex;
  gap:6px;
}

select, input[type="date"] {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#222;
  color:#fff;
}

/* 탭 */
.tabs {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab {
  padding:8px 16px;
  border-radius:20px;
  background:#1a1a1a;
  cursor:pointer;
  transition:0.2s;
}

.tab:hover {
  background:#333;
}

.tab.active {
  background:#fff;
  color:#000;
}

/* 카드 */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#121212;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.card img {
  width:100%;
  aspect-ratio:16/9;
  transition:0.4s;
}

.card:hover img {
  transform:scale(1.1);
  filter:brightness(0.6);
}

/* 플레이 버튼 */
.play {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  opacity:0;
  transition:0.3s;
}

.card:hover .play {
  opacity:1;
}

/* 카테고리 → 왼쪽 */
.category {
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  backdrop-filter: blur(6px);
}

/* NEW → 오른쪽 */
.badge {
  position:absolute;
  top:8px;
  right:8px;

  background:#ff3b3b;
  color:#fff;

  padding:3px 8px;
  border-radius:12px;

  font-size:10px;
  font-weight:600;

  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;

  z-index:5;

  box-shadow:0 2px 6px rgba(0,0,0,0.4);
}

/* 과제 (파랑 배경 + 흰 글씨) */
.category.assignment {
  background:#2563eb;
  color:#fff;
}

/* 연습 (흰 배경 + 검정 글씨) */
.category.free {
  background:#fff;
  color:#000;
}

/* 정보 */
.info {
  padding:12px;
}

.title {
  font-size:14px;
  font-weight:500;
  margin-bottom:4px;
  line-height:1.3;
}

.sub {
  font-size:12px;
  color:#aaa;
}

/* 모바일 */
@media (max-width:600px) {
  .grid {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<h2>🎸 영상 모음</h2>
<div class="notice">시트 입력 후 반영까지 1분 이내의 시간이 걸릴 수 있어요😋</div>

<!-- 필터 -->
<div class="filters">
  <div class="filter-group">
    <div class="label">닉네임</div>
    <select id="nameFilter">
      <option value="">전체</option>
    </select>
  </div>

  <div class="filter-group">
    <div class="label">📅 기간</div>
    <div class="date-range">
      <input type="date" id="startDate">
      <span>~</span>
      <input type="date" id="endDate">
    </div>
  </div>
</div>

<!-- 탭 -->
<div class="tabs">
  <div class="tab active" onclick="filter('all',0)">전체</div>
  <div class="tab" onclick="filter('assignment',1)">과제</div>
  <div class="tab" onclick="filter('free',2)">연습</div>
</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let currentFilter = "all";
let cache = {};

/* 🔥 API */
async function getYoutubeInfo(videoId){
  const API_KEY = "AIzaSyDeLlRW5ipOfesPCPu9ruc0FCC198fqNY0";

  if(cache[videoId]) return cache[videoId];

  const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${API_KEY}`);
  const data = await res.json();

  if(data.items.length === 0) return null;

  const result = {
    title: data.items[0].snippet.title
  };

  cache[videoId] = result;
  return result;
}

function getVideoId(url){
  if(url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
  if(url.includes("shorts")) return url.split("/shorts/")[1].split("?")[0];
  if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
  return null;
}

function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    allData = [];
    parseCSV(a,"assignment");
    parseCSV(f,"free");
    createNameOptions();
    render();
  });
}

function parseCSV(data,type){
  const rows = data.split("\n").slice(1);

  rows.forEach(row=>{
    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    if(!cols || cols.length<3) return;

    let date = cols[0].replace(/\./g,"-").trim();
    const name = cols[1];
    const url = cols[2];

    const videoId = getVideoId(url);
    if(!videoId) return;

    allData.push({date,name,url,videoId,type});
  });
}

function createNameOptions(){
  const select = document.getElementById("nameFilter");
  const names = [...new Set(allData.map(v=>v.name))];

  names.forEach(name=>{
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
}

async function render(){
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  const now = new Date();
  const selectedName = document.getElementById("nameFilter").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  for(const item of allData.slice().reverse()){

    if(currentFilter!=="all" && item.type!==currentFilter) continue;
    if(selectedName && item.name !== selectedName) continue;

    if(start && new Date(item.date) < new Date(start)) continue;
    if(end && new Date(item.date) > new Date(end)) continue;

    const diff = (now - new Date(item.date))/(1000*60*60*24);
    const isNew = diff>=0 && diff<3;

    const thumb = `https://img.youtube.com/vi/${item.videoId}/0.jpg`;
    const info = await getYoutubeInfo(item.videoId);
    const title = info ? info.title : "제목 없음";

    container.innerHTML += `
      <div class="card" onclick="window.open('${item.url}')">
<div class="category ${item.type}">
  ${item.type === "assignment" ? "과제" : "연습"}
</div>

${isNew ? '<div class="badge">NEW</div>' : ''}

        <img src="${thumb}">
        <div class="play">▶</div>

        <div class="info">
          <div class="title">${title}</div>
          <div class="sub">${item.name} · ${item.date}</div>
        </div>

      </div>
    `;
  }
}

function filter(type,i){
  currentFilter=type;
  document.querySelectorAll('.tab').forEach((t,idx)=>{
    t.classList.toggle('active', idx===i);
  });
  render();
}

document.getElementById("nameFilter").addEventListener("change", render);
document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

loadAll();
</script>

</body>
</html>
