<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  background:#0f0f0f;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

.tabs {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.tab {
  padding:8px 14px;
  border-radius:20px;
  background:#222;
  cursor:pointer;
}

.tab.active {
  background:#fff;
  color:#000;
}

.search {
  display:flex;
  gap:10px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.search input {
  padding:8px;
  border-radius:8px;
  border:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:18px;
}

.card {
  background:#181818;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

/* 🔥 hover 효과 */
.card:hover img {
  transform:scale(1.08);
  filter:brightness(0.7);
}

.card img {
  width:100%;
  aspect-ratio:16/9;
  transition:0.3s;
}

/* ▶ 아이콘 */
.play {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  opacity:0;
  transition:0.3s;
}

.card:hover .play {
  opacity:1;
}

.badge {
  position:absolute;
  top:8px;
  left:8px;
  background:red;
  font-size:11px;
  padding:4px 6px;
  border-radius:6px;
}

.info { padding:10px; }

.title {
  font-size:14px;
  font-weight:500;
}

.date {
  font-size:12px;
  color:#aaa;
}

@media (max-width:600px) {
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<h2>🎸 영상 모음</h2>

<div class="tabs">
  <div class="tab active" onclick="filter('all',0)">전체</div>
  <div class="tab" onclick="filter('assignment',1)">과제</div>
  <div class="tab" onclick="filter('free',2)">연습</div>
</div>

<div class="search">
  <input id="nameSearch" placeholder="닉네임 검색">
  <input id="dateSearch" placeholder="날짜 검색">
</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let currentFilter = "all";

function setTab(i){
  document.querySelectorAll('.tab').forEach((t,idx)=>{
    t.classList.toggle('active', idx===i);
  });
}

function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    allData = [];
    parseCSV(a,"assignment");
    parseCSV(f,"free");
    render();
  });
}

function parseCSV(data,type){
  const rows = data.split("\n").slice(1);

  rows.forEach(row=>{
    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    if(!cols || cols.length<3) return;

    let date = cols[0];
    const name = cols[1];
    const url = cols[2];

    if(!url) return;

    date = date.replace(/\./g,"-").replace(/\s/g,"");

    let videoId;
    if(url.includes("youtu.be")){
      videoId = url.split("/").pop().split("?")[0];
    } else {
      videoId = url.split("v=")[1]?.split("&")[0];
    }

    if(!videoId) return;

    // 🔥 제목 fallback (닉네임 사용)
    const title = name + "님의 영상";

    allData.push({date,name,url,videoId,type,title});
  });
}

function render(){
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  const now = new Date();
  const nameKeyword = document.getElementById("nameSearch").value.toLowerCase();
  const dateKeyword = document.getElementById("dateSearch").value;

  allData.slice().reverse().forEach(item=>{

    if(currentFilter!=="all" && item.type!==currentFilter) return;
    if(nameKeyword && !item.name.toLowerCase().includes(nameKeyword)) return;
    if(dateKeyword && !item.date.includes(dateKeyword)) return;

    const diff = (now - new Date(item.date))/(1000*60*60*24);
    const isNew = diff>=0 && diff<3;

    const thumb = `https://img.youtube.com/vi/${item.videoId}/0.jpg`;

    container.innerHTML += `
      <div class="card" onclick="window.open('${item.url}')">
        ${isNew ? '<div class="badge">NEW</div>' : ''}
        <img src="${thumb}">
        <div class="play">▶</div>
        <div class="info">
          <div class="title">${item.title}</div>
          <div class="date">${item.date}</div>
        </div>
      </div>
    `;
  });
}

function filter(type,i){
  currentFilter=type;
  setTab(i);
  render();
}

document.getElementById("nameSearch").addEventListener("input", render);
document.getElementById("dateSearch").addEventListener("input", render);

loadAll();
</script>

</body>
</html>
