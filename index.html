<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-Rock 소모임 영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

.header { margin-bottom:20px; }
h2 { margin:0 0 5px 0; }
.notice { font-size:13px; color:#888; }

.controls {
  background:#111;
  padding:15px;
  border-radius:16px;
  margin:20px 0;
}

.filters {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.filter-group {
  display:flex;
  flex-direction:column;
  gap:5px;
}

select, input {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:#fff;
}

.tabs {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.tab {
  padding:8px 16px;
  border-radius:20px;
  background:#1a1a1a;
  cursor:pointer;
}

.tab.active { background:#fff; color:#000; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:20px;
}

/* =========================
   CARD FIX
========================= */
.card {
  background:#121212;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;

  height:340px;              /* 🔥 고정 */
  display:flex;
  flex-direction:column;
}

.name-bar {
  background:#fff;
  color:#000;
  text-align:center;
  padding:8px;
  font-size:14px;
  flex-shrink:0;
}

.thumb-wrap {
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  flex-shrink:0;
}

.thumb-wrap img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* 외부 링크 */
.preview {
  width:100%;
  height:100%;
  background:#1a1a1a;
  padding:12px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.preview-title {
  font-size:13px;
  font-weight:600;
  margin-bottom:5px;
}

.preview-url {
  font-size:11px;
  color:#888;
  word-break:break-all;
}

/* =========================
   INFO FIX
========================= */
.info {
  padding:12px;
  flex:1;
  display:flex;
  flex-direction:column;
}

/* 🔥 제목 2줄 고정 */
.title {
  font-size:14px;
  margin-bottom:4px;
  line-height:1.3;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;

  overflow:hidden;
  min-height:36px;
}

.sub {
  font-size:12px;
  color:#aaa;
}

/* 메모 하단 고정 */
.memo {
  margin-top:auto;
  font-size:12px;
  color:#bbb;
  background:#1a1a1a;
  padding:6px 8px;
  border-radius:8px;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
</style>
</head>

<body>

<div class="header">
  <h2>🎸 영상 모음</h2>
  <div class="notice">시트 입력 후 반영까지 1분 정도 기다려 주세요😋</div>
</div>

<div class="controls">
  <div class="filters">
    <div class="filter-group">
      <span>닉네임</span>
      <select id="nameFilter"><option value="">전체</option></select>
    </div>

    <div class="filter-group">
      <span>시작일</span>
      <input type="date" id="startDate">
    </div>

    <div class="filter-group">
      <span>종료일</span>
      <input type="date" id="endDate">
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setFilter('all',0)">전체</div>
    <div class="tab" onclick="setFilter('assignment',1)">과제</div>
    <div class="tab" onclick="setFilter('free',2)">연습</div>
  </div>
</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let currentFilter = "all";
let ytCache = {};
let previewCache = {};

/* youtube id */
function getVideoId(url){
  if(!url) return null;
  if(url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
  if(url.includes("shorts")) return url.split("/shorts/")[1].split("?")[0];
  if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
}

/* youtube title */
async function getYTTitle(id){
  if(!id) return "";

  if(ytCache[id]) return ytCache[id];

  try {
    const API_KEY = "AIzaSyDeLlRW5ipOfesPCPu9ruc0FCC198fqNY0";
    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${API_KEY}`);
    const data = await res.json();

    const title = data?.items?.[0]?.snippet?.title || "유튜브 영상";
    ytCache[id] = title;
    return title;

  } catch {
    return "유튜브 영상";
  }
}

/* external preview */
async function getPreview(url){
  if(previewCache[url]) return previewCache[url];

  try {
    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    const result = {
      title: data?.data?.title || "외부 링크",
      url
    };

    previewCache[url] = result;
    return result;

  } catch {
    return { title:"외부 링크", url };
  }
}

/* load */
function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    parseCSV(a,"assignment");
    parseCSV(f,"free");
    createNames();
    render();
  });
}

/* parse */
function parseCSV(data,type){
  data.split("\n").slice(4).forEach(row=>{
    const c = row.split(",");
    if(c.length < 3) return;

    const date = c[0];
    const name = c[1];
    const url = c[2];
    const external = c[3] || "";
    const memo = (c.slice(4).join(",") || "").trim().slice(0,30);

    const videoId = getVideoId(url);

    if(!videoId && !external) return;

    allData.push({date,name,url,external,memo,videoId,type});
  });
}

/* names */
function createNames(){
  const sel = document.getElementById("nameFilter");
  [...new Set(allData.map(v=>v.name))].forEach(n=>{
    const o = document.createElement("option");
    o.value = n;
    o.textContent = n;
    sel.appendChild(o);
  });
}

/* render */
async function render(){
  const box = document.getElementById("videoList");
  box.innerHTML = "";

  const name = document.getElementById("nameFilter").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  const list = allData.slice().reverse().filter(v=>{
    if(currentFilter!=="all" && v.type!==currentFilter) return false;
    if(name && v.name!==name) return false;
    if(start && new Date(v.date)<new Date(start)) return false;
    if(end && new Date(v.date)>new Date(end)) return false;
    return true;
  });

  const html = [];

  for(const v of list){

    const link = v.external || `https://youtu.be/${v.videoId}`;

    let media = "";
    let title = "";

    if(v.external){
      const preview = await getPreview(v.external);
      title = preview.title;

      media = `
        <div class="preview">
          <div class="preview-title">${preview.title}</div>
          <div class="preview-url">${preview.url}</div>
        </div>
      `;
    } else {
      const thumb = `https://img.youtube.com/vi/${v.videoId}/0.jpg`;
      title = await getYTTitle(v.videoId);

      media = `<img src="${thumb}">`;
    }

    html.push(`
      <div class="card" onclick="window.open('${link}','_blank')">

        <div class="name-bar">${v.name}</div>

        <div class="thumb-wrap">
          ${media}
        </div>

        <div class="info">
          <div class="title">${title}</div>
          <div class="sub">${v.date}</div>
          ${v.memo ? `<div class="memo">💬 ${v.memo}</div>` : ""}
        </div>

      </div>
    `);
  }

  box.innerHTML = html.join("");
}

/* filter */
function setFilter(t,i){
  currentFilter=t;
  document.querySelectorAll(".tab").forEach((el,idx)=>{
    el.classList.toggle("active", idx===i);
  });
  render();
}

document.getElementById("nameFilter").addEventListener("change", render);
document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

loadAll();
</script>

</body>
</html>
