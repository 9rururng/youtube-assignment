<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  background:#0f0f0f;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

/* 안내 문구 */
.notice {
  font-size:13px;
  color:#aaa;
  margin-bottom:15px;
}

/* 필터 */
.filters {
  display:flex;
  gap:20px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter-group {
  background:#181818;
  padding:12px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.label {
  font-size:12px;
  color:#aaa;
}

.date-range {
  display:flex;
  align-items:center;
  gap:6px;
}

select, input[type="date"] {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#222;
  color:#fff;
}

/* 탭 */
.tabs {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab {
  padding:8px 14px;
  border-radius:20px;
  background:#222;
  cursor:pointer;
}

.tab.active {
  background:#fff;
  color:#000;
}

/* 카드 */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:18px;
}

.card {
  background:#181818;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

.card img {
  width:100%;
  aspect-ratio:16/9;
  transition:0.3s;
}

.card:hover img {
  transform:scale(1.08);
  filter:brightness(0.7);
}

.play {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  font-size:30px;
}

.card:hover .play {
  opacity:1;
}

.badge {
  position:absolute;
  top:8px;
  left:8px;
  background:red;
  font-size:11px;
  padding:4px 6px;
  border-radius:6px;
}

.info { padding:10px; }

@media (max-width:600px) {
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<h2>🎸 영상 모음</h2>
<div class="notice">시트 입력 후 반영까지 1분 이내의 시간이 걸릴 수 있어요😋</div>

<!-- 필터 -->
<div class="filters">

  <div class="filter-group">
    <div class="label">닉네임</div>
    <select id="nameFilter">
      <option value="">전체</option>
    </select>
  </div>

  <div class="filter-group">
    <div class="label">📅 기간</div>
    <div class="date-range">
      <input type="date" id="startDate">
      <span>~</span>
      <input type="date" id="endDate">
    </div>
  </div>

</div>

<!-- 탭 -->
<div class="tabs">
  <div class="tab active" onclick="filter('all',0)">전체</div>
  <div class="tab" onclick="filter('assignment',1)">과제</div>
  <div class="tab" onclick="filter('free',2)">연습</div>
</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let currentFilter = "all";

/* 탭 */
function setTab(i){
  document.querySelectorAll('.tab').forEach((t,idx)=>{
    t.classList.toggle('active', idx===i);
  });
}

/* 전체 로드 */
function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    allData = [];
    parseCSV(a,"assignment");
    parseCSV(f,"free");

    createNameOptions();
    render();
  });
}

/* 🔥 유튜브 ID 추출 (쇼츠 포함) */
function getVideoId(url){
  if(url.includes("youtu.be")){
    return url.split("/").pop().split("?")[0];
  }
  if(url.includes("shorts")){
    return url.split("/shorts/")[1].split("?")[0];
  }
  if(url.includes("v=")){
    return url.split("v=")[1].split("&")[0];
  }
  return null;
}

/* CSV 파싱 */
function parseCSV(data,type){
  const rows = data.split("\n").slice(1);

  rows.forEach(row=>{
    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    if(!cols || cols.length<3) return;

    let date = cols[0];
    const name = cols[1];
    const url = cols[2];

    if(!url) return;

    date = date.replace(/\./g,"-").replace(/\s/g,"");

    const videoId = getVideoId(url);
    if(!videoId) return;

    allData.push({date,name,url,videoId,type});
  });
}

/* 닉네임 리스트 */
function createNameOptions(){
  const select = document.getElementById("nameFilter");
  const names = [...new Set(allData.map(v=>v.name))];

  names.forEach(name=>{
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
}

/* 렌더 */
function render(){
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  const now = new Date();
  const selectedName = document.getElementById("nameFilter").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  allData.slice().reverse().forEach(item=>{

    if(currentFilter!=="all" && item.type!==currentFilter) return;
    if(selectedName && item.name !== selectedName) return;

    if(start && new Date(item.date) < new Date(start)) return;
    if(end && new Date(item.date) > new Date(end)) return;

    const diff = (now - new Date(item.date))/(1000*60*60*24);
    const isNew = diff>=0 && diff<3;

    const thumb = `https://img.youtube.com/vi/${item.videoId}/0.jpg`;

    container.innerHTML += `
      <div class="card" onclick="window.open('${item.url}')">
        ${isNew ? '<div class="badge">NEW</div>' : ''}
        <img src="${thumb}">
        <div class="play">▶</div>
        <div class="info">
          <div>${item.name}</div>
          <div style="font-size:12px;color:#aaa">${item.date}</div>
        </div>
      </div>
    `;
  });
}

/* 필터 */
function filter(type,i){
  currentFilter=type;
  setTab(i);
  render();
}

/* 이벤트 */
document.getElementById("nameFilter").addEventListener("change", render);
document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

loadAll();
</script>

</body>
</html>
