<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

/* 헤더 */
.header {
  margin-bottom:20px;
}

h2 {
  margin-bottom:5px;
}

.notice {
  font-size:13px;
  color:#888;
}

/* 🔥 컨트롤 바 */
.controls {
  background:#111;
  padding:15px;
  border-radius:16px;
  margin:20px 0;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.filters {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.filter-group {
  display:flex;
  flex-direction:column;
  gap:5px;
}

select, input {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:#fff;
}

/* 탭 */
.tabs {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.tab {
  padding:8px 16px;
  border-radius:20px;
  background:#1a1a1a;
  cursor:pointer;
  transition:0.2s;
}

.tab:hover {
  background:#333;
}

.tab.active {
  background:#fff;
  color:#000;
}

/* 카드 */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#121212;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* 닉네임 바 */
.name-bar {
  background:#fff;
  color:#000;
  text-align:center;
  padding:8px;
  font-size:14px;
  font-weight:500;
}

/* 썸네일 */
.thumb-wrap {
  position:relative;
}

.card img {
  width:100%;
  aspect-ratio:16/9;
  transition:0.3s;
}

.card:hover img {
  transform:scale(1.05);
}

/* 카테고리 */
.category {
  position:absolute;
  top:8px;
  left:8px;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
}

.category.assignment { background:#2563eb; color:#fff; }
.category.free { background:#fff; color:#000; }

/* NEW */
.badge {
  position:absolute;
  top:8px;
  right:8px;
  background:#ff3b3b;
  color:#fff;
  padding:3px 8px;
  border-radius:12px;
  font-size:10px;
  font-weight:600;
}

/* 정보 */
.info {
  padding:12px;
}

.title {
  font-size:14px;
  margin-bottom:4px;
  line-height:1.3;
}

.sub {
  font-size:12px;
  color:#aaa;
}

/* 모바일 */
@media (max-width:600px) {
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
  <h2>🎸 영상 모음</h2>
  <div class="notice">시트 입력 후 반영까지 1분 이내의 시간이 걸릴 수 있어요😋</div>
</div>

<!-- 🔥 컨트롤 -->
<div class="controls">
  <div class="filters">
    <div class="filter-group">
      <span>닉네임</span>
      <select id="nameFilter">
        <option value="">전체</option>
      </select>
    </div>

    <div class="filter-group">
      <span>시작일</span>
      <input type="date" id="startDate">
    </div>

    <div class="filter-group">
      <span>종료일</span>
      <input type="date" id="endDate">
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="filter('all',0)">전체</div>
    <div class="tab" onclick="filter('assignment',1)">과제</div>
    <div class="tab" onclick="filter('free',2)">연습</div>
  </div>
</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let currentFilter = "all";
let cache = {};

async function getTitle(id){
  const API_KEY = "AIzaSyDeLlRW5ipOfesPCPu9ruc0FCC198fqNY0";
  if(cache[id]) return cache[id];

  const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${API_KEY}`);
  const data = await res.json();

  const title = data.items?.[0]?.snippet?.title || "제목 없음";
  cache[id] = title;
  return title;
}

function getVideoId(url){
  if(url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
  if(url.includes("shorts")) return url.split("/shorts/")[1].split("?")[0];
  if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
}

function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    parseCSV(a,"assignment");
    parseCSV(f,"free");
    createNameOptions();
    render();
  });
}

function parseCSV(data,type){
  data.split("\n").slice(1).forEach(row=>{
    const cols = row.split(",");
    if(cols.length<3) return;

    const date = cols[0];
    const name = cols[1];
    const url = cols[2];
    const videoId = getVideoId(url);
    if(!videoId) return;

    allData.push({date,name,url,videoId,type});
  });
}

function createNameOptions(){
  const select = document.getElementById("nameFilter");
  [...new Set(allData.map(v=>v.name))].forEach(n=>{
    const opt = document.createElement("option");
    opt.value = n;
    opt.textContent = n;
    select.appendChild(opt);
  });
}

async function render(){
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  const now = new Date();
  const nameFilter = document.getElementById("nameFilter").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  for(const item of allData.slice().reverse()){
    if(currentFilter!=="all" && item.type!==currentFilter) continue;
    if(nameFilter && item.name!==nameFilter) continue;
    if(start && new Date(item.date)<new Date(start)) continue;
    if(end && new Date(item.date)>new Date(end)) continue;

    const diff = (now - new Date(item.date))/(1000*60*60*24);
    const isNew = diff>=0 && diff<3;

    const thumb = `https://img.youtube.com/vi/${item.videoId}/0.jpg`;
    const title = await getTitle(item.videoId);

    container.innerHTML += `
      <div class="card" onclick="window.open('${item.url}')">

        <div class="name-bar">${item.name}</div>

        <div class="thumb-wrap">
          <div class="category ${item.type}">
            ${item.type==="assignment"?"과제":"연습"}
          </div>

          ${isNew ? '<div class="badge">NEW</div>' : ''}

          <img src="${thumb}">
        </div>

        <div class="info">
          <div class="title">${title}</div>
          <div class="sub">${item.date}</div>
        </div>

      </div>
    `;
  }
}

function filter(type,i){
  currentFilter=type;
  document.querySelectorAll('.tab').forEach((t,idx)=>{
    t.classList.toggle('active', idx===i);
  });
  render();
}

document.getElementById("nameFilter").addEventListener("change", render);
document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

loadAll();
</script>

</body>
</html>
