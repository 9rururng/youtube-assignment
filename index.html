<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

.header { margin-bottom:20px; }
h2 { margin:0 0 5px 0; }
.notice { font-size:13px; color:#888; }

.controls {
  background:#111;
  padding:15px;
  border-radius:16px;
  margin:20px 0;
}

.filters {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.filter-group {
  display:flex;
  flex-direction:column;
  gap:5px;
}

select, input {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:#fff;
}

.tabs {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.tab {
  padding:8px 16px;
  border-radius:20px;
  background:#1a1a1a;
  cursor:pointer;
}

.tab.active { background:#fff; color:#000; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#121212;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-4px);
}

.name-bar {
  background:#fff;
  color:#000;
  text-align:center;
  padding:8px;
  font-size:14px;
}

/* media */
.thumb-wrap {
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  overflow:hidden;
}

.thumb-wrap img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* external preview */
.preview {
  width:100%;
  height:100%;
  background:#1a1a1a;
  padding:10px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.preview-title {
  font-size:13px;
  font-weight:600;
  margin-bottom:5px;
}

.preview-url {
  font-size:11px;
  color:#888;
  word-break:break-all;
}

/* info */
.info {
  padding:12px;
}

.title {
  font-size:14px;
  margin-bottom:4px;
}

.sub {
  font-size:12px;
  color:#aaa;
}

.memo {
  margin-top:6px;
  font-size:12px;
  color:#bbb;
  background:#1a1a1a;
  padding:6px 8px;
  border-radius:8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
</style>
</head>

<body>

<div class="header">
  <h2>🎸 영상 모음</h2>
  <div class="notice">시트 반영 약간 지연될 수 있음</div>
</div>

<div class="controls">
  <div class="filters">
    <div class="filter-group">
      <span>닉네임</span>
      <select id="nameFilter"><option value="">전체</option></select>
    </div>

    <div class="filter-group">
      <span>시작일</span>
      <input type="date" id="startDate">
    </div>

    <div class="filter-group">
      <span>종료일</span>
      <input type="date" id="endDate">
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setFilter('all',0)">전체</div>
    <div class="tab" onclick="setFilter('assignment',1)">과제</div>
    <div class="tab" onclick="setFilter('free',2)">연습</div>
  </div>
</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let currentFilter = "all";

/* youtube id */
function getVideoId(url){
  if(!url) return null;
  if(url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
  if(url.includes("shorts")) return url.split("/shorts/")[1].split("?")[0];
  if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
}

/* load */
function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    parseCSV(a,"assignment");
    parseCSV(f,"free");
    createNames();
    render();
  });
}

/* parse */
function parseCSV(data,type){
  data.split("\n").slice(4).forEach(row=>{
    const c = row.split(",");
    if(c.length < 3) return;

    const date = c[0];
    const name = c[1];
    const url = c[2];
    const external = c[3] || "";
    const memo = (c[4] || "").slice(0,30);

    const videoId = getVideoId(url);

    if(!videoId && !external) return;

    allData.push({date,name,url,external,memo,videoId,type});
  });
}

/* name */
function createNames(){
  const sel = document.getElementById("nameFilter");
  [...new Set(allData.map(v=>v.name))].forEach(n=>{
    const o = document.createElement("option");
    o.value = n;
    o.textContent = n;
    sel.appendChild(o);
  });
}

/* render */
function render(){
  const box = document.getElementById("videoList");
  box.innerHTML = "";

  const name = document.getElementById("nameFilter").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  for(const v of allData.slice().reverse()){

    if(currentFilter!=="all" && v.type!==currentFilter) continue;
    if(name && v.name!==name) continue;
    if(start && new Date(v.date)<new Date(start)) continue;
    if(end && new Date(v.date)>new Date(end)) continue;

    const link = v.external || v.url;

    let media = "";

    /* 외부 링크 */
    if(v.external){
      media = `
        <div class="preview">
          <div class="preview-title">외부 링크</div>
          <div class="preview-url">${v.external}</div>
        </div>
      `;
    }
    /* 유튜브 */
    else {
      const thumb = `https://img.youtube.com/vi/${v.videoId}/0.jpg`;
      media = `<img src="${thumb}">`;
    }

    box.innerHTML += `
      <div class="card" onclick="window.open('${link}','_blank')">

        <div class="name-bar">${v.name}</div>

        <div class="thumb-wrap">
          ${media}
        </div>

        <div class="info">
          <div class="title">${v.videoId || v.external}</div>
          <div class="sub">${v.date}</div>
          ${v.memo ? `<div class="memo">💬 ${v.memo}</div>` : ""}
        </div>

      </div>
    `;
  }
}

/* filter */
function setFilter(t,i){
  currentFilter=t;
  document.querySelectorAll(".tab").forEach((el,idx)=>{
    el.classList.toggle("active", idx===i);
  });
  render();
}

document.getElementById("nameFilter").addEventListener("change", render);
document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

loadAll();
</script>

</body>
</html>
