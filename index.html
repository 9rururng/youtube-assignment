<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 모음</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  background:#0b0b0b;
  color:#fff;
  margin:0;
  padding:20px;
  font-family:'Noto Sans KR', sans-serif;
}

.header { margin-bottom:20px; }
h2 { margin-bottom:5px; }
.notice { font-size:13px; color:#888; }

.controls {
  background:#111;
  padding:15px;
  border-radius:16px;
  margin:20px 0;
}

.filters {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.filter-group {
  display:flex;
  flex-direction:column;
  gap:5px;
}

select, input {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:#fff;
}

.tabs {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.tab {
  padding:8px 16px;
  border-radius:20px;
  background:#1a1a1a;
  cursor:pointer;
}

.tab.active { background:#fff; color:#000; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#121212;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
}

.name-bar {
  background:#fff;
  color:#000;
  text-align:center;
  padding:8px;
  font-size:14px;
}

.thumb-wrap img {
  width:100%;
  aspect-ratio:16/9;
  display:block;
}

.preview {
  width:100%;
  aspect-ratio:16/9;
  background:#1a1a1a;
  padding:12px;
  box-sizing:border-box;
}

.preview-title {
  font-size:13px;
  font-weight:600;
}

.preview-url {
  font-size:11px;
  color:#888;
  word-break:break-all;
}

.info {
  padding:12px;
}

.title {
  font-size:14px;
}

.sub {
  font-size:12px;
  color:#aaa;
}

.memo-line {
  margin-top:6px;
  font-size:12px;
  color:#bbb;
  background:#1a1a1a;
  padding:6px 8px;
  border-radius:8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
</style>
</head>

<body>

<div class="header">
  <h2>🎸 영상 모음</h2>
  <div class="notice">시트 반영까지 약간의 시간이 걸릴 수 있어요</div>
</div>

<div class="controls">
  <div class="filters">
    <div class="filter-group">
      <span>닉네임</span>
      <select id="nameFilter">
        <option value="">전체</option>
      </select>
    </div>

    <div class="filter-group">
      <span>시작일</span>
      <input type="date" id="startDate">
    </div>

    <div class="filter-group">
      <span>종료일</span>
      <input type="date" id="endDate">
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="filter('all',0)">전체</div>
    <div class="tab" onclick="filter('assignment',1)">과제</div>
    <div class="tab" onclick="filter('free',2)">연습</div>
  </div>
</div>

<div class="grid" id="videoList"></div>

<script>
const urls = {
  assignment: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=0",
  free: "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv&gid=570271576"
};

let allData = [];
let currentFilter = "all";
let cache = {};
let previewCache = {};

/* 유튜브 ID */
function getVideoId(url){
  if(!url) return null;
  if(url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
  if(url.includes("shorts")) return url.split("/shorts/")[1].split("?")[0];
  if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
}

/* 외부 링크 미리보기 */
async function getPreview(url){
  if(previewCache[url]) return previewCache[url];

  try {
    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    const result = {
      title: data?.data?.title || url,
      url
    };

    previewCache[url] = result;
    return result;

  } catch {
    return { title:url, url };
  }
}

/* 데이터 로드 */
function loadAll(){
  Promise.all([
    fetch(urls.assignment).then(r=>r.text()),
    fetch(urls.free).then(r=>r.text())
  ]).then(([a,f])=>{
    parseCSV(a,"assignment");
    parseCSV(f,"free");
    createNameOptions();
    render();
  });
}

/* CSV */
function parseCSV(data,type){
  data.split("\n").slice(1).forEach(row=>{
    const cols = row.split(",");
    if(cols.length < 3) return;

    const date = cols[0];
    const name = cols[1];
    const url = cols[2];
    const external = cols[3] || "";
    const memo = (cols[4] || "").slice(0,30);

    const videoId = getVideoId(url);

    if(!videoId && !external) return;

    allData.push({
      date,
      name,
      url,
      external,
      memo,
      videoId,
      type
    });
  });
}

/* 닉네임 */
function createNameOptions(){
  const select = document.getElementById("nameFilter");
  [...new Set(allData.map(v=>v.name))].forEach(n=>{
    const opt = document.createElement("option");
    opt.value = n;
    opt.textContent = n;
    select.appendChild(opt);
  });
}

/* 렌더 */
async function render(){
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  const nameFilter = document.getElementById("nameFilter").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  for(const item of allData.slice().reverse()){

    if(currentFilter!=="all" && item.type!==currentFilter) continue;
    if(nameFilter && item.name!==nameFilter) continue;
    if(start && new Date(item.date)<new Date(start)) continue;
    if(end && new Date(item.date)>new Date(end)) continue;

    let title = "";
    let mediaHTML = "";
    let openUrl = item.external || item.url;

    /* 외부 링크 */
    if(item.external){
      const preview = await getPreview(item.external);
      title = preview.title;

      mediaHTML = `
        <div class="preview">
          <div class="preview-title">${preview.title}</div>
          <div class="preview-url">${preview.url}</div>
        </div>
      `;
    }

    /* 유튜브 */
    else if(item.videoId){
      const thumb = `https://img.youtube.com/vi/${item.videoId}/0.jpg`;
      title = item.videoId;

      mediaHTML = `<img src="${thumb}">`;
    }

    container.innerHTML += `
      <div class="card" onclick="window.open('${openUrl}')">

        <div class="name-bar">${item.name}</div>

        <div class="thumb-wrap">
          ${mediaHTML}
        </div>

        <div class="info">
          <div class="title">${title}</div>
          <div class="sub">${item.date}</div>

          ${item.memo ? `<div class="memo-line">💬 ${item.memo}</div>` : ""}
        </div>

      </div>
    `;
  }
}

/* 필터 */
function filter(type,i){
  currentFilter=type;
  document.querySelectorAll('.tab').forEach((t,idx)=>{
    t.classList.toggle('active', idx===i);
  });
  render();
}

document.getElementById("nameFilter").addEventListener("change", render);
document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

loadAll();
</script>

</body>
</html>
