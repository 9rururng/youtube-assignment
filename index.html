<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-rock 소모임 과제 영상</title>

  <style>
    body {
      background:#0f0f0f;
      color:#fff;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      margin:0;
      padding:20px;
    }

    h2 {
      margin-bottom:20px;
    }

    /* PC 기본 */
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
      gap:18px;
    }

    .card {
      background:#181818;
      border-radius:14px;
      overflow:hidden;
      transition:transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform:translateY(-6px);
      box-shadow:0 12px 25px rgba(0,0,0,0.5);
    }

    .card img {
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
    }

    .info {
      padding:12px;
    }

    .name {
      font-size:15px;
      font-weight:500;
    }

    .date {
      font-size:12px;
      color:#aaa;
      margin-top:4px;
    }

    /* 📱 모바일 */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns:1fr;
        gap:14px;
      }

      body {
        padding:12px;
      }

      .name {
        font-size:16px;
      }
    }

    /* 📱 태블릿 */
    @media (min-width: 601px) and (max-width: 900px) {
      .grid {
        grid-template-columns:repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<h2>🎸 과제 제출 영상</h2>
<div class="grid" id="videoList"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1kTpj8r_CAJTbxjRgtbF2YZ4rOXsB9shoZ2YPO6o8wzE/export?format=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(4); // ⭐ 5번째 줄부터

    rows.reverse().forEach(row => {
      const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);

      if (!cols || cols.length < 3) return;

      const date = cols[0];
      const name = cols[1];
      const url = cols[2];

      if (!url) return;

      let videoId;

      if (url.includes("youtu.be")) {
        videoId = url.split("/").pop().split("?")[0];
      } else {
        videoId = url.split("v=")[1]?.split("&")[0];
      }

      if (!videoId) return;

      const thumb = `https://img.youtube.com/vi/${videoId}/0.jpg`;

      const card = `
        <div class="card">
          <a href="${url}" target="_blank">
            <img src="${thumb}">
          </a>
          <div class="info">
            <div class="name">${name}</div>
            <div class="date">${date}</div>
          </div>
        </div>
      `;

      document.getElementById("videoList").innerHTML += card;
    });
  });
</script>

</body>
</html>
